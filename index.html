<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Focus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container">
        <header>
            <h1>TaskMaster</h1>
        </header>

        <section class="input-section">
            <input type="text" id="taskInput" placeholder="Add a new task..." aria-label="New task">
            <button id="addBtn">+</button>
        </section>

        <nav class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">To Do</button>
            <button class="filter-btn" data-filter="completed">Done</button>
        </nav>

        <ul id="taskList"></ul>

        <div id="emptyMessage" class="empty-state"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
